<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Me a Message</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; color: #111; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
        label { display: block; font-size: 0.85rem; font-weight: 500; color: #444; margin-bottom: 6px; }
        .opt { color: #999; font-weight: 400; }
        .req { color: #c00; }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 18px;
        }
        input[type="text"]:focus, textarea:focus { border-color: #555; }
        textarea { resize: vertical; min-height: 130px; }
        .file-area {
            border: 1.5px dashed #e0e0e0;
            border-radius: 8px;
            padding: 22px 16px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 18px;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .file-area:hover, .file-area.drag-over { border-color: #555; background: #fafafa; }
        .file-area input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
            width: 100%; height: 100%; margin: 0; padding: 0;
        }
        .file-icon { font-size: 1.4rem; margin-bottom: 5px; }
        .file-label { font-size: 0.85rem; color: #888; }
        .file-selected { font-size: 0.85rem; color: #111; font-weight: 500; word-break: break-all; }
        .progress-wrap { margin-bottom: 18px; display: none; }
        .progress-label { font-size: 0.8rem; color: #666; margin-bottom: 5px; }
        .progress-bar { height: 4px; background: #e8e8e8; border-radius: 2px; }
        .progress-fill { height: 100%; background: #111; border-radius: 2px; transition: width 0.2s; width: 0%; }
        button {
            width: 100%;
            padding: 13px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.5; cursor: default; }
        .error { color: #c00; font-size: 0.85rem; margin-bottom: 14px; display: none; }
        .success { text-align: center; display: none; }
        .success h2 { font-size: 1.3rem; margin-bottom: 8px; color: #111; }
        .success p { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-section">
            <h1>Send me a message</h1>
            <p class="subtitle">Drop a note — I'll read every one.</p>

            <label for="name">Your name <span class="opt">(optional)</span></label>
            <input type="text" id="name" placeholder="e.g. Alex">

            <label for="message">Message <span class="req">*</span></label>
            <textarea id="message" placeholder="What's on your mind?"></textarea>

            <label>Attach a file <span class="opt">(optional — any size)</span></label>
            <div class="file-area" id="file-area">
                <input type="file" id="file-input" onchange="onFileChange()">
                <div class="file-icon">&#128206;</div>
                <div id="file-label" class="file-label">Click to browse or drag a file here</div>
            </div>

            <div class="progress-wrap" id="progress-wrap">
                <div class="progress-label" id="progress-label">Uploading file...</div>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            </div>

            <div class="error" id="error"></div>
            <button id="submit-btn" onclick="sendMessage()">Send Message</button>
        </div>

        <div class="success" id="success-section">
            <h2>Message sent!</h2>
            <p>Thanks for reaching out. I appreciate it.</p>
        </div>
    </div>

    <script>
        function onFileChange() {
            const file = document.getElementById('file-input').files[0]
            const label = document.getElementById('file-label')
            label.className = file ? 'file-selected' : 'file-label'
            label.textContent = file ? file.name : 'Click to browse or drag a file here'
        }

        const fileArea = document.getElementById('file-area')
        fileArea.addEventListener('dragover', e => { e.preventDefault(); fileArea.classList.add('drag-over') })
        fileArea.addEventListener('dragleave', () => fileArea.classList.remove('drag-over'))
        fileArea.addEventListener('drop', e => {
            e.preventDefault()
            fileArea.classList.remove('drag-over')
            if (e.dataTransfer.files.length) {
                document.getElementById('file-input').files = e.dataTransfer.files
                onFileChange()
            }
        })

        async function sendMessage() {
            const name    = document.getElementById('name').value.trim()
            const message = document.getElementById('message').value.trim()
            const file    = document.getElementById('file-input').files[0]
            const errorEl = document.getElementById('error')
            const btn     = document.getElementById('submit-btn')

            errorEl.style.display = 'none'
            if (!message) {
                errorEl.textContent = 'Please write a message before sending.'
                errorEl.style.display = 'block'
                return
            }

            btn.disabled = true
            btn.textContent = 'Sending...'

            try {
                let file_name = null
                let file_path = null

                if (file) {
                    btn.textContent = 'Getting upload link...'
                    const urlRes = await fetch('/.netlify/functions/get-upload-url', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fileName: file.name, contentType: file.type || 'application/octet-stream' })
                    })
                    if (!urlRes.ok) throw new Error('upload-url')

                    const { signedUrl, path } = await urlRes.json()
                    file_path = path
                    file_name = file.name

                    document.getElementById('progress-wrap').style.display = 'block'
                    btn.textContent = 'Uploading file...'
                    await uploadWithProgress(signedUrl, file)
                    document.getElementById('progress-fill').style.width = '100%'
                    document.getElementById('progress-label').textContent = 'Upload complete'
                }

                btn.textContent = 'Saving message...'
                const res = await fetch('/.netlify/functions/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, message, file_name, file_path })
                })

                if (res.ok) {
                    document.getElementById('form-section').style.display = 'none'
                    document.getElementById('success-section').style.display = 'block'
                } else {
                    throw new Error('save')
                }
            } catch {
                btn.disabled = false
                btn.textContent = 'Send Message'
                document.getElementById('progress-wrap').style.display = 'none'
                document.getElementById('progress-fill').style.width = '0%'
                errorEl.textContent = 'Something went wrong. Please try again.'
                errorEl.style.display = 'block'
            }
        }

        function uploadWithProgress(url, file) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest()
                xhr.upload.onprogress = e => {
                    if (e.lengthComputable) {
                        const pct = Math.round(e.loaded / e.total * 100)
                        document.getElementById('progress-fill').style.width = pct + '%'
                        document.getElementById('progress-label').textContent = `Uploading file... ${pct}%`
                    }
                }
                xhr.onload  = () => xhr.status < 300 ? resolve() : reject(new Error('upload-failed'))
                xhr.onerror = () => reject(new Error('upload-error'))
                xhr.open('PUT', url)
                xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream')
                xhr.send(file)
            })
        }
    </script>
</body>
</html>
